- name: Create app directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: ubuntu
    mode: "0755"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    mode: "0644"

- name: Deploy prometheus.yml
  ansible.builtin.copy:
    src: prometheus.yml
    dest: "{{ app_dir }}/prometheus.yml"
    mode: "0644"

- name: Pull images
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: "{{ app_dir }}"
  register: pull
  changed_when: "'Downloaded' in pull.stdout or 'newer' in pull.stdout"

- name: Start stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ app_dir }}"
  register: up
  changed_when: "'Started' in up.stderr or 'Creating' in up.stderr"
