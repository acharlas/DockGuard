---
- name: Deploy DockGuard
  hosts: all
  become: true
  vars:
    app_dir: /opt/dockguard
    domain: "{{ lookup('env', 'DOMAIN') }}"
    db_password: "{{ lookup('env', 'DB_PASSWORD') }}"
    grafana_admin_password: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') }}"
  tasks:
    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        mode: "0755"

    - name: Deploy docker-compose
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ app_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Deploy prometheus config
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../monitoring/prometheus/prometheus.yml"
        dest: "{{ app_dir }}/prometheus.yml"
        mode: "0644"

    - name: Deploy grafana provisioning
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../monitoring/grafana/provisioning/"
        dest: "{{ app_dir }}/grafana/provisioning/"
        mode: "0644"

    - name: Pull and start services
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        pull: always
        state: present
