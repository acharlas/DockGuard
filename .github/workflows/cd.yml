name: CD
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: production
    if: github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        working-directory: terraform
    outputs:
      domain: ${{ steps.out.outputs.domain }}
      vm_public_ip: ${{ steps.out.outputs.vm_public_ip }}
    env:
      TF_VAR_oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
      TF_VAR_oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
      TF_VAR_oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
      TF_VAR_oci_region: ${{ secrets.OCI_REGION }}
      TF_VAR_oci_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
      TF_VAR_oci_availability_domain: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
      TF_VAR_oci_instance_image_ocid: ${{ secrets.OCI_INSTANCE_IMAGE_OCID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
          terraform_wrapper: false

      - name: Init
        run: |
          terraform init \
            -backend-config='endpoints={ s3 = "https://${{ vars.OCI_NAMESPACE }}.compat.objectstorage.${{ secrets.OCI_REGION }}.oraclecloud.com" }' \
            -backend-config="access_key=${{ secrets.OCI_S3_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.OCI_S3_SECRET_KEY }}" \
            -backend-config="skip_s3_checksum=true" \
            -backend-config="use_path_style=true"

      - name: Apply
        run: terraform apply -auto-approve

      - name: Outputs
        id: out
        run: |
          echo "domain=$(terraform output -raw domain)" >> "$GITHUB_OUTPUT"
          echo "vm_public_ip=$(terraform output -raw vm_public_ip)" >> "$GITHUB_OUTPUT"

  ansible:
    needs: terraform
    runs-on: ubuntu-latest
    environment: production
    env:
      DOMAIN: ${{ needs.terraform.outputs.domain }}
      VM_IP: ${{ needs.terraform.outputs.vm_public_ip }}
      ANSIBLE_PRIVATE_KEY_FILE: ~/.ssh/deploy_key
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - run: pip install ansible

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy
        working-directory: ansible
        run: |
          echo "[all]" > /tmp/inventory
          echo "$VM_IP" >> /tmp/inventory
          ansible-playbook playbook.yml -i /tmp/inventory \
            --ssh-common-args="-o StrictHostKeyChecking=accept-new"

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            curl -sf --max-time 10 "https://dockguard.${{ needs.terraform.outputs.domain }}/api/v1/health" && exit 0
            sleep 5
          done
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
