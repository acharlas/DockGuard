name: destroy

on:
  workflow_dispatch:

env:
  TF_VERSION: "1.7.5"

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.OCI_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_S3_SECRET_KEY }}
      TF_VAR_oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
      TF_VAR_oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
      TF_VAR_oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
      TF_VAR_oci_region: ${{ secrets.OCI_REGION }}
      TF_VAR_oci_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
      TF_VAR_oci_availability_domain: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
      TF_VAR_oci_instance_image_ocid: ${{ secrets.OCI_INSTANCE_IMAGE_OCID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_ssh_allowed_cidr: ${{ secrets.SSH_ALLOWED_CIDR }}
      TF_VAR_cloudflare_ssh_service_token_id: ${{ secrets.CLOUDFLARE_SSH_SERVICE_TOKEN_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Init backend
        working-directory: terraform
        env:
          OCI_NAMESPACE: ${{ vars.OCI_NAMESPACE }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          cat > backend.hcl <<EOF
          endpoints = { s3 = "https://${OCI_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com" }
          access_key = "${AWS_ACCESS_KEY_ID}"
          secret_key = "${AWS_SECRET_ACCESS_KEY}"
          skip_s3_checksum = true
          use_path_style = true
          EOF
          terraform init -backend-config=backend.hcl
          rm backend.hcl

      - name: Remove state bucket from state
        working-directory: terraform
        run: terraform state rm oci_objectstorage_bucket.tf_state

      - name: Destroy all infrastructure
        working-directory: terraform
        run: terraform destroy -auto-approve
