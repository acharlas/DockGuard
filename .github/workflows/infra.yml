name: infra

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "ansible/**"
      - ".github/workflows/infra.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "ansible/**"
      - ".github/workflows/infra.yml"

concurrency:
  group: infra
  cancel-in-progress: false

env:
  TF_VERSION: "1.7.5"

jobs:
  terraform-plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.OCI_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_S3_SECRET_KEY }}
      TF_VAR_oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
      TF_VAR_oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
      TF_VAR_oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
      TF_VAR_oci_region: ${{ secrets.OCI_REGION }}
      TF_VAR_oci_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
      TF_VAR_oci_availability_domain: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
      TF_VAR_oci_instance_image_ocid: ${{ secrets.OCI_INSTANCE_IMAGE_OCID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_ssh_allowed_cidr: ${{ secrets.SSH_ALLOWED_CIDR }}
      TF_VAR_cloudflare_ssh_service_token_id: ${{ secrets.CLOUDFLARE_SSH_SERVICE_TOKEN_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: terraform
        env:
          OCI_NAMESPACE: ${{ vars.OCI_NAMESPACE }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          cat > backend.hcl <<EOF
          endpoints = { s3 = "https://${OCI_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com" }
          access_key = "${AWS_ACCESS_KEY_ID}"
          secret_key = "${AWS_SECRET_ACCESS_KEY}"
          skip_s3_checksum = true
          use_path_style = true
          EOF
          terraform init -backend-config=backend.hcl
          rm backend.hcl

      - name: Plan
        working-directory: terraform
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

      - name: Comment plan on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const body = `#### Terraform Plan\n\`\`\`\n${plan.substring(0, 60000)}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body.includes('Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
              body: body.substring(0, 65536)
            });

  terraform-apply:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    outputs:
      domain: ${{ steps.out.outputs.domain }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.OCI_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_S3_SECRET_KEY }}
      TF_VAR_oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
      TF_VAR_oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
      TF_VAR_oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
      TF_VAR_oci_region: ${{ secrets.OCI_REGION }}
      TF_VAR_oci_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
      TF_VAR_oci_availability_domain: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
      TF_VAR_oci_instance_image_ocid: ${{ secrets.OCI_INSTANCE_IMAGE_OCID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_ssh_allowed_cidr: ${{ secrets.SSH_ALLOWED_CIDR }}
      TF_VAR_cloudflare_ssh_service_token_id: ${{ secrets.CLOUDFLARE_SSH_SERVICE_TOKEN_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Init
        working-directory: terraform
        env:
          OCI_NAMESPACE: ${{ vars.OCI_NAMESPACE }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          cat > backend.hcl <<EOF
          endpoints = { s3 = "https://${OCI_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com" }
          access_key = "${AWS_ACCESS_KEY_ID}"
          secret_key = "${AWS_SECRET_ACCESS_KEY}"
          skip_s3_checksum = true
          use_path_style = true
          EOF
          terraform init -backend-config=backend.hcl
          rm backend.hcl

      - name: Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Outputs
        id: out
        working-directory: terraform
        run: |
          echo "domain=$(terraform output -raw domain)" >> "$GITHUB_OUTPUT"

  ansible-provision:
    needs: [terraform-apply]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: pip install ansible

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Provision
        working-directory: ansible
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          ANSIBLE_PRIVATE_KEY_FILE: ~/.ssh/deploy_key
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          HOST="ssh.dockguard.${{ needs.terraform-apply.outputs.domain }}"
          echo "[all]" > /tmp/inventory
          echo "$HOST" >> /tmp/inventory
          ansible-playbook playbook.yml -i /tmp/inventory \
            --ssh-common-args="-o ProxyCommand='/usr/local/bin/cloudflared access ssh --hostname %h --id \"$CF_ACCESS_CLIENT_ID\" --secret \"$CF_ACCESS_CLIENT_SECRET\"' -o StrictHostKeyChecking=accept-new"

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            curl -sf --max-time 10 "https://dockguard.${{ needs.terraform-apply.outputs.domain }}/api/v1/health" && exit 0
            sleep 10
          done
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
