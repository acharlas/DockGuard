name: DockGuard CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - run: terraform fmt -check
        working-directory: terraform
      - run: terraform init -backend=false
        working-directory: terraform
      - run: terraform validate
        working-directory: terraform

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: backend
      - run: ruff check app/ tests/
        working-directory: backend
      - run: ruff format --check app/ tests/
        working-directory: backend

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  test-backend:
    needs: [lint-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: backend
      - run: python -m pytest --cov --cov-report=term --cov-fail-under=70
        working-directory: backend

  test-backend-postgres:
    needs: [lint-backend]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dockguard
          POSTGRES_PASSWORD: dockguard
          POSTGRES_DB: dockguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dockguard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: backend
      - run: alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://dockguard:dockguard@127.0.0.1:5432/dockguard
      - run: python -m pytest tests/test_postgres_integration.py -q
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://dockguard:dockguard@127.0.0.1:5432/dockguard
          POSTGRES_TEST_DATABASE_URL: postgresql+asyncpg://dockguard:dockguard@127.0.0.1:5432/dockguard

  test-frontend:
    needs: [lint-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm test
        working-directory: frontend
        env:
          CI: true

  build:
    needs: [validate-terraform, test-backend, test-backend-postgres, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build backend dev image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: dev
          push: false
          platforms: linux/arm64
          tags: dockguard-backend-dev:${{ github.sha }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          platforms: linux/arm64
          tags: dockguard-backend:${{ github.sha }}
          outputs: type=docker,dest=/tmp/backend.tar

      - name: Build frontend dev image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: dev
          push: false
          platforms: linux/arm64
          tags: dockguard-frontend-dev:${{ github.sha }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          platforms: linux/arm64
          tags: dockguard-frontend:${{ github.sha }}
          outputs: type=docker,dest=/tmp/frontend.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar
          retention-days: 1

  security-scan:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - run: docker load -i /tmp/backend.tar
      - run: docker load -i /tmp/frontend.tar

      # Full scan → SARIF for GitHub Security tab (all vuln types, never blocks)
      - name: Scan backend image (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.29.0
        with:
          image-ref: dockguard-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          exit-code: "0"
          severity: CRITICAL,HIGH,MEDIUM,LOW

      - name: Scan frontend image (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.29.0
        with:
          image-ref: dockguard-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "0"
          severity: CRITICAL,HIGH,MEDIUM,LOW

      - name: Upload backend SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload frontend SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      # Security gate: fail on CRITICAL app-library CVEs we can actually fix.
      # OS CVEs in the base image are tracked above and handled via base image updates.
      - name: Gate on backend app library CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.29.0
        with:
          image-ref: dockguard-backend:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          vuln-type: library
          ignore-unfixed: true

      - name: Gate on frontend app library CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.29.0
        with:
          image-ref: dockguard-frontend:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          vuln-type: library
          ignore-unfixed: true

  push-registry:
    needs: [security-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - run: docker load -i /tmp/backend.tar
      - run: docker load -i /tmp/frontend.tar

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend
        run: |
          docker tag dockguard-backend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/dockguard-backend:${{ github.sha }}
          docker tag dockguard-backend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/dockguard-backend:latest
          docker push ghcr.io/${{ github.repository_owner }}/dockguard-backend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/dockguard-backend:latest

      - name: Push frontend
        run: |
          docker tag dockguard-frontend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/dockguard-frontend:${{ github.sha }}
          docker tag dockguard-frontend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/dockguard-frontend:latest
          docker push ghcr.io/${{ github.repository_owner }}/dockguard-frontend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/dockguard-frontend:latest

  deploy-app:
    needs: [push-registry]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via Ansible
        working-directory: ansible
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          ANSIBLE_PRIVATE_KEY_FILE: ~/.ssh/deploy_key
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: ansible-playbook playbook.yml --tags deploy
