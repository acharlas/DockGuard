name: app

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - "terraform/**"
      - "ansible/**"
      - ".github/workflows/infra.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "terraform/**"
      - "ansible/**"
      - ".github/workflows/infra.yml"

concurrency:
  group: app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e "backend/[dev]"
      - run: ruff check backend/app/ backend/tests/
      - run: ruff format --check backend/app/ backend/tests/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dockguard
          POSTGRES_PASSWORD: dockguard
          POSTGRES_DB: dockguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dockguard"
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e "backend/[dev]"
      - run: alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://dockguard:dockguard@127.0.0.1:5432/dockguard
      - run: python -m pytest backend/tests/ --cov --cov-report=term --cov-fail-under=70
        env:
          DATABASE_URL: postgresql+asyncpg://dockguard:dockguard@127.0.0.1:5432/dockguard
          POSTGRES_TEST_DATABASE_URL: postgresql+asyncpg://dockguard:dockguard@127.0.0.1:5432/dockguard

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm test
        working-directory: frontend
        env:
          CI: true

  build-scan-push-deploy:
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      security-events: write
    environment: production
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/dockguard-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/dockguard-backend:latest

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/dockguard-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/dockguard-frontend:latest

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/dockguard-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          exit-code: "0"

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/dockguard-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "0"

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: backend

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: frontend

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/dockguard-backend:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          vuln-type: library
          ignore-unfixed: true

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/dockguard-frontend:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          vuln-type: library
          ignore-unfixed: true

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - run: pip install ansible

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Get domain from Terraform state
        id: tf
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OCI_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_S3_SECRET_KEY }}
          OCI_NAMESPACE: ${{ vars.OCI_NAMESPACE }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          cat > backend.hcl <<EOF
          endpoints = { s3 = "https://${OCI_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com" }
          access_key = "${AWS_ACCESS_KEY_ID}"
          secret_key = "${AWS_SECRET_ACCESS_KEY}"
          skip_s3_checksum = true
          use_path_style = true
          EOF
          terraform init -backend-config=backend.hcl
          echo "domain=$(terraform output -raw domain)" >> "$GITHUB_OUTPUT"
          rm backend.hcl

      - name: Deploy via Ansible
        working-directory: ansible
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          ANSIBLE_PRIVATE_KEY_FILE: ~/.ssh/deploy_key
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          HOST="ssh.dockguard.${{ steps.tf.outputs.domain }}"
          echo "[all]" > /tmp/inventory
          echo "$HOST" >> /tmp/inventory
          ansible-playbook playbook.yml -i /tmp/inventory \
            --ssh-common-args="-o ProxyCommand='/usr/local/bin/cloudflared access ssh --hostname %h --id \"$CF_ACCESS_CLIENT_ID\" --secret \"$CF_ACCESS_CLIENT_SECRET\"' -o StrictHostKeyChecking=accept-new"

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            curl -sf --max-time 10 "https://dockguard.${{ steps.tf.outputs.domain }}/api/v1/health" && exit 0
            sleep 10
          done
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
